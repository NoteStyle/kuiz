<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sijil Pencapaian</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Fredoka', sans-serif;
    background:#e8f5e9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* SIJIL */
.certificate{
    width:800px;
    background:white;
    padding:40px;
    border:10px solid #4caf50;
    border-radius:20px;
    text-align:center;
    position:relative;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

h1{
    color:#2e7d32;
    font-size:40px;
}

h2{
    margin:20px 0;
    font-size:30px;
}

.score{
    font-size:50px;
    color:#ff9800;
    margin:20px 0;
}

.name{
    font-size:35px;
    font-weight:bold;
    color:#333;
}

/* BUTTON */
button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#4caf50;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#388e3c;
}

/* PRINT MODE */
@media print {
    button{
        display:none;
    }

    body{
        background:white;
    }

    .certificate{
        box-shadow:none;
    }
}

</style>

</head>

<body>

<div class="certificate">

    <h1>📜 SIJIL PENCAPAIAN 📜</h1>

    <p>Diberikan kepada</p>

    <div class="name" id="name">-</div>

    <p>kerana berjaya mengumpul markah</p>

    <div class="score" id="score">0</div>

    <p>dalam permainan</p>

    <h2>♻️ Jom Asingkan Sampah ♻️</h2>

    <p id="date"></p>

    <button onclick="window.print()">🖨️ Cetak Sijil</button>

</div>

<script src="certificate.js"></script>

</body>
</html>
